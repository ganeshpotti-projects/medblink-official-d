version: "3.8"

services:

  # ----------------------------
  # ZOOKEEPER
  # ----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ----------------------------
  # KAFKA
  # ----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # ----------------------------
  # KAFKA UI
  # ----------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # ----------------------------
  # BACKEND
  # ----------------------------
  backend:
    image: medblink/medblink-backend:V1.0 
    container_name: medblink-backend
    ports:
      - "30082:8080"
    env_file:
      - ./.env
    depends_on:
      - kafka

  # ----------------------------
  # CUSTOMER FRONTEND
  # ----------------------------
  customer-frontend:
    image: medblink/medblink-customer:V1.0
    container_name: medblink-customer
    ports:
      - "30081:80"
    depends_on:
      - backend

# ----------------------------
  # ADMIN FRONTEND
  # ----------------------------
  admin-frontend:
    image: medblink/medblink-admin:V1.0
    container_name: medblink-admin
    ports:
      - "30083:80"
    depends_on:
      - backend

# ----------------------------
  # PARTNER FRONTEND
  # ----------------------------
  partner-frontend:
    image: medblink/medblink-partner:V1.0
    container_name: medblink-partner
    ports:
      - "30084:80"
    depends_on:
      - backend