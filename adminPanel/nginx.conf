server {
    listen 80;

    root /usr/share/nginx/html;

    # Serve the SPA at /medblink-admin/
    location /medblink-admin/ {
        try_files $uri /medblink-admin/index.html;
    }

    # Serve static assets
    location /medblink-admin/assets/ {
        try_files $uri =404;
    }

    # Optional: handle favicon
    location = /favicon.ico {
        try_files $uri =404;
    }
}