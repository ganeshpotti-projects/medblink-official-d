server {
    listen 80;

    root /usr/share/nginx/html;

    # Serve the SPA at /medblink-partner/
    location /medblink-partner/ {
        try_files $uri /medblink-partner/index.html;
    }

    # Serve static assets
    location /medblink-partner/assets/ {
        try_files $uri =404;
    }

    # Optional: handle favicon
    location = /favicon.ico {
        try_files $uri =404;
    }
}