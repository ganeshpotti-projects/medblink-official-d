server {
    listen 80;

    root /usr/share/nginx/html;

    # Serve the SPA at /medblink-customer/
    location /medblink-customer/ {
        try_files $uri /medblink-customer/index.html;
    }

    # Serve static assets
    location /medblink-customer/assets/ {
        try_files $uri =404;
    }

    # Optional: handle favicon
    location = /favicon.ico {
        try_files $uri =404;
    }
}